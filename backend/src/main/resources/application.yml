spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agrotoken}
    username: ${SPRING_DATASOURCE_USERNAME:agrotoken}
    password: ${SPRING_DATASOURCE_PASSWORD:agrotoken}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

agrotoken:
  solana:
    rpc-url: ${AGROTOKEN_SOLANA_RPC_URL:https://api.devnet.solana.com}
    program-id: ${AGROTOKEN_PROGRAM_ID:Agro111111111111111111111111111111111111111}
    oracle-wallet: ${AGROTOKEN_ORACLE_WALLET:Oracle11111111111111111111111111111111111}

