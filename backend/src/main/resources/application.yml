spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/agrotoken}
    username: ${SPRING_DATASOURCE_USERNAME:agrotoken}
    password: ${SPRING_DATASOURCE_PASSWORD:agrotoken}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: llama3.2

agrotoken:
  solana:
    rpc-url: ${AGROTOKEN_SOLANA_RPC_URL:https://api.devnet.solana.com}
    program-id: ${AGROTOKEN_PROGRAM_ID:GM4oyeT5WV1mC1KVgwPMhUV4YMJw8e1i1GKkXMjYnvvY}
    oracle-wallet: ${AGROTOKEN_ORACLE_WALLET:Oracle11111111111111111111111111111111111}
    usdc-mint: ${AGROTOKEN_USDC_MINT:4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}

