version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agrotoken-postgres
    environment:
      POSTGRES_DB: agrotoken
      POSTGRES_USER: agrotoken
      POSTGRES_PASSWORD: agrotoken
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: agrotoken-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agrotoken
      SPRING_DATASOURCE_USERNAME: agrotoken
      SPRING_DATASOURCE_PASSWORD: agrotoken
      AGROTOKEN_SOLANA_RPC_URL: https://api.devnet.solana.com
      AGROTOKEN_PROGRAM_ID: Agro111111111111111111111111111111111111111
      AGROTOKEN_ORACLE_WALLET: Oracle11111111111111111111111111111111111
    ports:
      - "8080:8080"

volumes:
  postgres-data:

